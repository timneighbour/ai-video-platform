# ISS-018: CI/CD pipeline — typecheck + test on every PR and push to main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript typecheck
        run: pnpm exec tsc --noEmit

      - name: Run tests
        run: pnpm test
        env:
          # Tests that require DB/S3 are mocked; set dummy values to satisfy env validation
          DATABASE_URL: "mysql://ci:ci@localhost:3306/ci_test"
          JWT_SECRET: "ci-test-secret-32-chars-minimum!!"
          WAVESPEED_API_KEY: "ci-dummy"
          HEYGEN_API_KEY: "ci-dummy"
          KLING_AI_ACCESS_KEY: "ci-dummy"
          KLING_AI_SECRET_KEY: "ci-dummy"
          RUNWAY_ML_API_KEY: "ci-dummy"
          STRIPE_SECRET_KEY: "sk_test_ci_dummy"
          STRIPE_WEBHOOK_SECRET: "whsec_ci_dummy"
          BUILT_IN_FORGE_API_KEY: "ci-dummy"
          BUILT_IN_FORGE_API_URL: "https://ci.example.com"
          VITE_APP_ID: "ci-app-id"
          OAUTH_SERVER_URL: "https://ci.example.com"
          OWNER_OPEN_ID: "ci-owner"
          OWNER_NAME: "CI Owner"
