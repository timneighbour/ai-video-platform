<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary SEO -->
    <title>WizVid AI — AI Video Generator, Lip Sync & Text to Video Platform</title>
    <meta name="description" content="WizVid AI: Create stunning AI videos, lip-sync avatars, and text-to-video content in seconds. Powered by Kling AI, HeyGen, Runway ML & Seedance 2.0." />
    <meta name="keywords" content="AI video generator, text to video, lip sync AI, talking avatar, AI video creation, Kling AI, HeyGen, Runway ML, Seedance, AI voiceover, video AI platform, WizVid" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="WizVid AI" />
    <link rel="canonical" href="https://wizvid.ai/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wizvid.ai/" />
    <meta property="og:title" content="WizVid AI — AI Video Generator, Lip Sync & Text to Video" />
    <meta property="og:description" content="Create stunning AI videos, lip-sync avatars, and text-to-video content in seconds. Powered by Kling AI, HeyGen, Runway ML & Seedance 2.0. Start free." />
    <meta property="og:image" content="https://wizvid.ai/og-image.png" />
    <meta property="og:site_name" content="WizVid AI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://wizvid.ai/" />
    <meta name="twitter:title" content="WizVid AI — AI Video Generator, Lip Sync & Text to Video" />
    <meta name="twitter:description" content="Create stunning AI videos, lip-sync avatars, and text-to-video content in seconds. Start free with 50 trial credits." />
    <meta name="twitter:image" content="https://wizvid.ai/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "WizVid AI",
      "url": "https://wizvid.ai",
      "description": "WizVid AI is a premium AI video generation platform offering text-to-video, lip-sync avatars, video-to-video style transfer, and AI voiceover tools powered by Kling AI, HeyGen, Runway ML, and Seedance 2.0.",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "Web",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "GBP",
          "description": "50 free trial credits to get started"
        },
        {
          "@type": "Offer",
          "name": "Starter",
          "price": "19",
          "priceCurrency": "GBP",
          "billingIncrement": "month",
          "description": "1,000 credits per month, watermark-free"
        },
        {
          "@type": "Offer",
          "name": "Pro",
          "price": "49",
          "priceCurrency": "GBP",
          "billingIncrement": "month",
          "description": "3,000 credits per month, 4K upscaling included"
        },
        {
          "@type": "Offer",
          "name": "Business",
          "price": "149",
          "priceCurrency": "GBP",
          "billingIncrement": "month",
          "description": "10,000 credits per month, API access, team collaboration"
        }
      ],
      "featureList": [
        "Text to Video Generation",
        "Lip Sync and Talking Avatar",
        "Video to Video Style Transfer",
        "AI Voiceover",
        "WizPilot Quick Create",
        "Free Storyboard Generation",
        "4K Export",
        "160+ Languages"
      ],
      "screenshot": "https://wizvid.ai/og-image.png",
      "softwareVersion": "1.0",
      "creator": {
        "@type": "Organization",
        "name": "WizVid AI",
        "url": "https://wizvid.ai"
      }
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Barlow+Condensed:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
