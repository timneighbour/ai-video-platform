    <!-- 3 ── FAQPage ─────────────────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is WIZ AI and what can I create with it?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WIZ AI is a premium AI creative platform that lets you generate cinematic videos, original music tracks, AI images, short-form content, and character animation from a single text prompt. It includes six core tools — WizAudio, WizImage, WizVideo, WizShorts, WizAnimate, and WizScript — plus four proprietary AI engines: WizSound™, WizLumina™, WizGenesis™, and WizBoost™. No editing experience is required."
          }
        },
        {
          "@type": "Question",
          "name": "How does WizSound™ improve my AI-generated audio?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WizSound™ is WIZ AI's proprietary cinematic audio mastering engine. It applies a professional DSP chain — including low-shelf bass boost, vocal presence EQ, and high-shelf air enhancement — to every AI-generated track. The result is broadcast-quality, spatially mastered audio that sounds like it was mixed in a professional studio. WizSound™ is applied automatically to every render and can be toggled on or off for a direct before/after comparison."
          }
        },
        {
          "@type": "Question",
          "name": "What does WizLumina™ do to my AI video output?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WizLumina™ is WIZ AI's visual enhancement engine. It applies AI-powered colour grading, HDR enhancement, frame sharpening, and cinematic colour correction to every frame of your AI-generated video. The result looks like it was graded by a professional colourist. WizLumina™ works automatically on every export and is included in the Cinematic render tier."
          }
        },
        {
          "@type": "Question",
          "name": "Can I create a full music video from just a song?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. WizVideo lets you upload any audio track and WIZ AI will automatically generate a full-length music video — complete with AI-directed scenes, consistent characters, beat-synced visuals, and cinematic effects. The entire process from upload to finished video takes under five minutes. You can preview every scene before rendering and only pay credits when you are ready to export."
          }
        },
        {
          "@type": "Question",
          "name": "Is WIZ AI free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "WIZ AI offers a free trial that includes 1 complete music video (up to 8 scenes) with no credit card required. Paid plans start from £29 per month (Starter — 2 videos/month), with Creator at £79/month (6 videos/month) and Pro at £149/month (12 videos/month). All plans include access to the full suite of AI tools including WizSound™ and WizLumina™. Storyboarding and previewing are always free — you only render when you are happy with the result."
          }
        }
      ]
    }
    </script>
